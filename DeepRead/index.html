<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeepRead  — Nhà của Cáo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="app-header">
      <!-- Logo + tên ứng dụng -->
      <div class="header-brand">
        <i class="fa-solid fa-torii-gate gate-icon"></i>
        Nhà của Cáo &nbsp;·&nbsp; DeepRead
      </div>

      <!-- Công tắc chế độ học -->
      <div class="mode-switcher">
        <span class="mode-label" id="label-practice">Luyện tập</span>
        <label class="toggle-switch" aria-label="Chuyển chế độ học">
          <input type="checkbox" id="mode-toggle" />
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </label>
        <span class="mode-label" id="label-exam">Kiểm tra</span>
      </div>
  </header>

  <!-- ===== LAYOUT CHÍNH ===== -->
  <div class="app-layout">

    <!-- ===== SIDEBAR TRÁI ===== -->
    <aside class="sidebar" id="sidebar">
      <!-- Trạng thái đang tải -->
      <div class="sidebar-loading" id="sidebar-loading">
        <div class="skeleton-group">
          <div class="skeleton skeleton-label"></div>
          <div class="skeleton skeleton-item"></div>
          <div class="skeleton skeleton-item"></div>
        </div>
        <div class="skeleton-group">
          <div class="skeleton skeleton-label"></div>
          <div class="skeleton skeleton-item"></div>
          <div class="skeleton skeleton-item"></div>
        </div>
      </div>

      <!-- Danh sách bài đọc theo cấp độ (được render bởi JS) -->
      <nav class="sidebar-nav" id="sidebar-nav" hidden></nav>
    </aside>

    <!-- ===== NỘI DUNG CHÍNH ===== -->
    <main class="main-content" id="main-content">

      <!-- Skeleton loader độc lập — hiện khi đang tải bài, ẩn sau đó -->
      <!-- QUAN TRỌNG: div này tách biệt với #reading-area để không phá cấu trúc DOM bên trong -->
      <div class="reading-loader-wrap" id="reading-loader" hidden>
        <div style="max-width:800px;margin:0 auto;display:flex;flex-direction:column;gap:16px;">
          <div style="display:flex;align-items:center;gap:12px;">
            <div class="skeleton" style="height:24px;width:48px;border-radius:99px;"></div>
            <div class="skeleton" style="height:24px;width:200px;border-radius:6px;"></div>
          </div>
          <div class="card" style="padding:28px 32px;">
            <div class="skeleton" style="height:13px;margin-bottom:14px;border-radius:4px;"></div>
            <div class="skeleton" style="height:13px;width:94%;margin-bottom:14px;border-radius:4px;"></div>
            <div class="skeleton" style="height:13px;width:88%;margin-bottom:14px;border-radius:4px;"></div>
            <div class="skeleton" style="height:13px;width:96%;border-radius:4px;"></div>
          </div>
          <div class="card" style="padding:24px 28px;">
            <div class="skeleton" style="height:10px;width:60px;margin-bottom:14px;border-radius:4px;"></div>
            <div class="skeleton" style="height:14px;width:80%;margin-bottom:18px;border-radius:4px;"></div>
            <div class="skeleton" style="height:44px;margin-bottom:8px;border-radius:8px;"></div>
            <div class="skeleton" style="height:44px;margin-bottom:8px;border-radius:8px;"></div>
            <div class="skeleton" style="height:44px;border-radius:8px;"></div>
          </div>
        </div>
      </div>

      <!-- Màn hình chào (hiển thị khi chưa chọn bài) -->
      <div class="welcome-screen" id="welcome-screen">
        <div class="welcome-icon">読</div>
        <h2 class="welcome-heading">Chọn một bài đọc để bắt đầu</h2>
        <p class="welcome-sub">Chọn bài từ danh sách bên trái để luyện đọc và trả lời câu hỏi.</p>
        <div class="welcome-chips">
          <span class="chip">📖 Hỗ trợ Furigana theo level</span>
          <span class="chip">✅ Luyện tập & Kiểm tra</span>
          <span class="chip">💾 Lưu tiến trình</span>
        </div>
      </div>

      <!-- Khu vực bài đọc (ẩn cho tới khi chọn bài) -->
      <div class="reading-area" id="reading-area" style="display: none;">

        <div class="reading-text-section">
          <!-- Thẻ thông tin bài đọc -->
          <div class="reading-meta-bar" id="reading-meta-bar">
            <span class="reading-level-badge" id="reading-level-badge"></span>
            <h1 class="reading-title" id="reading-title"></h1>
          </div>

          <!-- Thẻ nội dung bài đọc -->
          <div class="card reading-card" id="reading-card">
            <div class="reading-body" id="reading-body"></div>
          </div>
        </div>

        <div class="reading-question-section">
          <!-- Khu vực câu hỏi -->
          <div class="questions-section" id="questions-section"></div>

          <!-- Nút Nộp bài (chỉ hiện ở chế độ Kiểm tra) -->
          <div class="submit-bar" id="submit-bar" hidden>
            <button class="btn btn-submit" id="submit-btn" onclick="handleSubmitExam()">
              <span>Nộp bài</span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
          </div>

          <!-- Kết quả tổng quát (chế độ Kiểm tra) -->
          <div class="result-summary card" id="result-summary" hidden>
            <div class="result-icon" id="result-icon"></div>
            <div class="result-text">
              <p class="result-score" id="result-score"></p>
              <p class="result-message" id="result-message"></p>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
