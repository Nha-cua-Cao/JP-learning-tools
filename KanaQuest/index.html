<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhà của Cáo - Kana Quest</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary: #ff7e67;
            /* Soft Coral */
            --secondary: #60b2b8;
            /* Soft Teal */
            --bg-light: #fdfaf6;
            --text-dark: #2c3e50;
        }

        body {
            font-family: 'Noto Sans JP', 'Lexend', sans-serif;
            background-color: var(--bg-light);
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text-dark);
        }

        /* Clean Header */
        .navbar {
            background-color: white !important;
            border-bottom: 3px solid var(--primary);
        }

        .navbar-brand {
            color: var(--primary) !important;
            font-weight: 700;
        }

        /* Sidebar & Main Layout */
        .sidebar {
            width: 280px;
            background: white;
            padding: 1.5rem;
            border-right: 1px solid #eee;
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* The "Card" Look */
        #question-area {
            font-size: 8rem;
            font-weight: 700;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
            color: var(--primary);
        }

        /* Buttons & Inputs */
        .btn-primary {
            background-color: var(--primary);
            border: none;
        }

        .btn-primary:hover {
            background-color: #ff6b52;
        }

        .mcq-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 500px;
        }

        .btn-outline-dark {
            border: 2px solid #eee;
            background: white;
            transition: all 0.2s ease;
        }

        .btn-outline-dark:hover,
        .active {
            background-color: var(--secondary) !important;
            color: white !important;
            border-color: var(--secondary) !important;
            transform: translateY(-2px);
        }

        .section-label {
            font-size: 0.75rem;
            font-weight: 800;
            color: #999;
            text-transform: uppercase;
            margin: 1.5rem 0 0.5rem;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <nav class="navbar px-4 shadow-sm">
        <a class="navbar-brand" href="#">
            <i class="fa-solid fa-torii-gate me-2"></i><span>Nhà của Cáo - Kana Quest</span>
        </a>
    </nav>

    <div class="d-flex flex-grow-1 overflow-hidden">
        <aside class="sidebar overflow-auto d-flex flex-column justify-content-center">
            <div class="section-label">Bảng chữ cái</div>
            <div class="form-check"><input class="form-check-input" type="checkbox" id="hiragana" checked><label
                    class="form-check-label">Hiragana</label></div>
            <div class="form-check"><input class="form-check-input" type="checkbox" id="katakana"><label
                    class="form-check-label">Katakana</label></div>
            <div class="form-check"><input class="form-check-input" type="checkbox" id="dakuten"><label
                    class="form-check-label">Biến âm</label></div>
            <div class="form-check"><input class="form-check-input" type="checkbox" id="combo"><label
                    class="form-check-label">Âm ghép</label></div>
            <div class="form-check mb-3"><input class="form-check-input" type="checkbox" id="sokuon"><label
                    class="form-check-label">Âm ngắt</label></div>

            <div class="section-label">Loại câu hỏi</div>
            <div class="form-check"><input class="form-check-input" type="radio" name="quizType" id="single"
                    checked><label class="form-check-label">Kí tự đơn</label></div>
            <div class="form-check"><input class="form-check-input" type="radio" name="quizType" id="mixed"><label
                    class="form-check-label">Trộn lẫn kí tự</label></div>
            <div class="form-check mb-3"><input class="form-check-input" type="radio" name="quizType"
                    id="vocabulary"><label class="form-check-label">Dựa theo từ vựng</label></div>

            <div class="mb-4">
                <label class="form-label small fw-bold">Số câu hỏi</label>
                <input type="number" class="form-control" id="quizLimit" value="10">
            </div>

            <button class="btn btn-primary w-100 fw-bold py-2 shadow-sm" id="startBtn">BẮT ĐẦU</button>
        </aside>

        <main class="main-content">
            <div id="question-area">あ</div>

            <div class="answer-section w-100 d-flex justify-content-center">
                <div id="mcq-view" class="mcq-grid">
                </div>

                <div id="written-view" class="w-100 max-width-500 hidden" style="max-width: 500px;">
                    <input type="text" class="form-control form-control-lg text-center" placeholder="Nhập Romaji...">
                </div>
            </div>

            <div id="navigation-controls" class="mt-5 d-flex gap-3 hidden">
                <button id="prevBtn" class="btn btn-light border px-4"><i class="fa-solid fa-chevron-left"></i></button>
                <button id="checkBtn" class="btn btn-success px-5 fw-bold shadow-sm">Kiểm tra đáp án</button>
                <button id="nextBtn" class="btn btn-light border px-4"><i
                        class="fa-solid fa-chevron-right"></i></button>
            </div>
        </main>
    </div>

    <div class="modal fade" id="feedbackModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div id="modal-header-bg" class="modal-header text-white border-0">
                    <h5 class="modal-title">Kết quả</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center py-5">
                    <div id="modalIcon" class="mb-3 fs-1"></div>
                    <p id="modalMessage" class="fs-4"></p>
                </div>
                <div class="modal-footer justify-content-center border-0 pb-4">
                    <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Đóng</button>
                    <button type="button" class="btn btn-primary px-4" id="modalNextBtn">Câu tiếp theo</button>
                </div>
            </div>
        </div>
    </div>

ragana", "tags": ["dakuten"] }, { "kana": "ゆうめい", "romaji": "yuumei", "script": "hiragana", "tags": [] }, { "kana": "ゆき", "romaji": "yuki", "script": "hiragana", "tags": [] }, { "kana": "ゆく", "romaji": "yuku", "script": "hiragana", "tags": [] }, { "kana": "ゆっくりと", "romaji": "yukkurito", "script": "hiragana", "tags": ["sokuon"] }, { "kana": "ようか", "romaji": "youka", "script": "hiragana", "tags": [] }, { "kana": "ようふく", "romaji": "youfuku", "script": "hiragana", "tags": [] }, { "kana": "よく", "romaji": "yoku", "script": "hiragana", "tags": [] }, { "kana": "よこ", "romaji": "yoko", "script": "hiragana", "tags": [] }, { "kana": "よっか", "romaji": "yokka", "script": "hiragana", "tags": ["sokuon"] }, { "kana": "よっつ", "romaji": "yottsu", "script": "hiragana", "tags": ["sokuon"] }, { "kana": "よぶ", "romaji": "yobu", "script": "hiragana", "tags": ["dakuten"] }, { "kana": "よむ", "romaji": "yomu", "script": "hiragana", "tags": [] }, { "kana": "よる", "romaji": "yoru", "script": "hiragana", "tags": [] }, { "kana": "よわい", "romaji": "yowai", "script": "hiragana", "tags": [] }, { "kana": "らいげつ", "romaji": "raigetsu", "script": "hiragana", "tags": ["dakuten"] }, { "kana": "らいしゅう", "romaji": "raishuu", "script": "hiragana", "tags": ["combination"] }, { "kana": "らいねん", "romaji": "rainen", "script": "hiragana", "tags": [] }, { "kana": "ラジオ", "romaji": "rajio", "script": "katakana", "tags": ["dakuten"] }, { "kana": "ラジカセ", "romaji": "rajikase", "script": "katakana", "tags": ["dakuten"] }, { "kana": "りっぱ", "romaji": "rippa", "script": "hiragana", "tags": ["dakuten", "sokuon"] }, { "kana": "りゅうがくせい", "romaji": "ryuugakusei", "script": "hiragana", "tags": ["dakuten", "combination"] }, { "kana": "りょうしん", "romaji": "ryoushin", "script": "hiragana", "tags": ["combination"] }, { "kana": "りょうり", "romaji": "ryouri", "script": "hiragana", "tags": ["combination"] }, { "kana": "りょこう", "romaji": "ryokou", "script": "hiragana", "tags": ["combination"] }, { "kana": "れい", "romaji": "rei", "script": "hiragana", "tags": [] }, { "kana": "れいぞうこ", "romaji": "reizouko", "script": "hiragana", "tags": ["dakuten"] }, { "kana": "レストラン", "romaji": "resutoran", "script": "katakana", "tags": [] }, { "kana": "れんしゅうする", "romaji": "renshuusuru", "script": "hiragana", "tags": ["combination"] }, { "kana": "ろうか", "romaji": "rouka", "script": "hiragana", "tags": [] }, { "kana": "ろく", "romaji": "roku", "script": "hiragana", "tags": [] }, { "kana": "ワイシャツ", "romaji": "waishatsu", "script": "katakana", "tags": ["combination"] }, { "kana": "わかい", "romaji": "wakai", "script": "hiragana", "tags": [] }, { "kana": "わかる", "romaji": "wakaru", "script": "hiragana", "tags": [] }, { "kana": "わすれる", "romaji": "wasureru", "script": "hiragana", "tags": [] }, { "kana": "わたくし", "romaji": "watakushi", "script": "hiragana", "tags": [] }, { "kana": "わたし", "romaji": "watashi", "script": "hiragana", "tags": [] }, { "kana": "わたす", "romaji": "watasu", "script": "hiragana", "tags": [] }, { "kana": "わたる", "romaji": "wataru", "script": "hiragana", "tags": [] }, { "kana": "わるい", "romaji": "warui", "script": "hiragana", "tags": [] }]
        };

        let state = {
            questions: [],
            currentIndex: 0,
            userAnswers: [],
            isStarted: false
        };

        // UI Element Shortcuts
        const el = {
            question: document.getElementById('question-area'),
            mcq: document.getElementById('mcq-view'),
            written: document.getElementById('written-view'),
            writtenInput: document.querySelector('#written-view input'),
            prevBtn: document.getElementById('prevBtn'),
            nextBtn: document.getElementById('nextBtn'),
            navigation: document.getElementById('navigation-controls')
        };

        /**
         * 2. CORE LOGIC (The Brain)
         */
        function generateQuestions() {
            const settings = {
                hira: document.getElementById('hiragana').checked,
                kata: document.getElementById('katakana').checked,
                dakuten: document.getElementById('dakuten').checked,
                combo: document.getElementById('combo').checked,
                sokuon: document.getElementById('sokuon').checked,
                limit: parseInt(document.getElementById('quizLimit').value) || 10,
                isVocab: document.getElementById('vocabulary').checked,
                isMixed: document.getElementById('mixed').checked
            };

            // Build the pool of valid characters
            const charPool = KANA_DATA.characters.filter(item => {
                const scriptMatch = (settings.hira && item.script === 'hiragana') || (settings.kata && item.script === 'katakana');
                if (!scriptMatch) return false;
                if (item.tags.includes('dakuten') && !settings.dakuten) return false;
                if (item.tags.includes('combination') && !settings.combo) return false;
                if (item.tags.includes('sokuon') && !settings.sokuon) return false;
                return true;
            });

            if (charPool.length === 0 && !settings.isVocab) return [];

            let questions = [];
            for (let i = 0; i < settings.limit; i++) {
                if (settings.isVocab) {
                    questions.push({ ...KANA_DATA.vocabulary[Math.floor(Math.random() * KANA_DATA.vocabulary.length)] });
                } else if (settings.isMixed) {
                    questions.push(generateMixedString(charPool));
                } else {
                    questions.push({ ...charPool[Math.floor(Math.random() * charPool.length)] });
                }
            }
            return questions;
        }

        function generateMixedString(pool) {
            const len = Math.floor(Math.random() * 3) + 2; // 2-4 chars
            let kana = "", romaji = "";
            for (let j = 0; j < len; j++) {
                let char = pool[Math.floor(Math.random() * pool.length)];
                while (j === 0 && (char.kana === 'ん' || char.kana === 'ン')) {
                    char = pool[Math.floor(Math.random() * pool.length)];
                }
                kana += char.kana;
                romaji += char.romaji;
            }
            return { kana, romaji, type: 'mixed' };
        }

        /**
         * 3. UI ENGINE (The Artist)
         */
        function render() {
            if (!state.isStarted || !state.questions.length) return;

            el.navigation.classList.remove('hidden');

            const current = state.questions[state.currentIndex];
            el.question.textContent = current.kana;

            // Reset views
            el.mcq.classList.add('hidden');
            el.written.classList.add('hidden');

            // Randomize quiz mode (MCQ vs Written)
            const mode = Math.random() > 0.5 ? 'mcq' : 'written';

            if (mode === 'mcq') {
                el.mcq.classList.remove('hidden');
                renderMCQ(current.romaji);
            } else {
                el.written.classList.remove('hidden');
                el.writtenInput.value = state.userAnswers[state.currentIndex] || "";
                el.writtenInput.focus();
            }

            updateNavigation();
        }

        function renderMCQ(correct) {
            el.mcq.innerHTML = '';
            const allOptions = [...KANA_DATA.characters, ...KANA_DATA.vocabulary].map(v => v.romaji);
            const distractors = [...new Set(allOptions.filter(r => r !== correct))].sort(() => 0.5 - Math.random()).slice(0, 3);

            const choices = [correct, ...distractors].sort(() => 0.5 - Math.random());

            choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-outline-dark p-3 fs-4 shadow-sm';
                btn.textContent = choice;
                if (state.userAnswers[state.currentIndex] === choice) btn.classList.add('active');

                btn.onclick = () => {
                    document.querySelectorAll('#mcq-view button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.userAnswers[state.currentIndex] = choice;
                };
                el.mcq.appendChild(btn);
            });
        }

        function updateNavigation() {
            el.prevBtn.disabled = state.currentIndex === 0;
            el.nextBtn.disabled = state.currentIndex === state.questions.length - 1;
        }

        function saveAnswer() {
            if (!el.written.classList.contains('hidden')) {
                state.userAnswers[state.currentIndex] = el.writtenInput.value.trim().toLowerCase();
            }
        }

        /**
         * 4. INTERACTION HANDLERS
         */
        document.getElementById('startBtn').onclick = () => {
            const qs = generateQuestions();
            if (!qs.length) return alert("Hãy chọn ít nhất 1 bảng chữ cái!");

            state = { questions: qs, currentIndex: 0, userAnswers: new Array(qs.length).fill(""), isStarted: true };
            render();
        };

        document.getElementById('prevBtn').onclick = () => {
            if (state.currentIndex > 0) { saveAnswer(); state.currentIndex--; render(); }
        };

        document.getElementById('nextBtn').onclick = () => {
            if (state.currentIndex < state.questions.length - 1) { saveAnswer(); state.currentIndex++; render(); }
        };

        document.getElementById('checkBtn').onclick = () => {
            if (!state.isStarted) return;
            saveAnswer();

            const current = state.questions[state.currentIndex];
            const user = state.userAnswers[state.currentIndex];
            if (!user) return alert("Hãy trả lời trước khi kiểm tra đáp án!");

            const isCorrect = user.toLowerCase() === current.romaji.toLowerCase();
            showFeedback(isCorrect, current, user);
        };

        function showFeedback(isCorrect, current, user) {
            const modalEl = document.getElementById('feedbackModal');
            const modal = new bootstrap.Modal(modalEl);

            document.getElementById('modal-header-bg').className = `modal-header text-white ${isCorrect ? 'bg-success' : 'bg-danger'}`;
            document.getElementById('modalIcon').innerHTML = `<i class="fa-solid ${isCorrect ? 'fa-circle-check' : 'fa-circle-xmark'}"></i>`;
            document.getElementById('modalMessage').innerHTML = isCorrect
                ? `<strong>Quá đỉnh! 🥳🥳🥳</strong><br>Đúng là ${current.kana} đọc là ${current.romaji}`
                : `<strong>Chưa đúng rồi! 🥺🥺🥺</strong><br>${current.kana} đọc là ${current.romaji}<br><small>Đáp án của bạn: ${user}</small>`;

            document.getElementById('modalNextBtn').classList.toggle('hidden', state.currentIndex >= state.questions.length - 1);
            modal.show();
        }

        document.getElementById('modalNextBtn').onclick = () => {
            bootstrap.Modal.getInstance(document.getElementById('feedbackModal')).hide();
            state.currentIndex++;
            render();
        };
    </script>
