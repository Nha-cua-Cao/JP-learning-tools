<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nghe Tiếng Nhật - Blazecard</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <header class="header">
    <div class="header-brand">
      <i class="fa-solid fa-torii-gate gate-icon"></i>
      <span>NHÀ CỦA CÁO . BLAZECARD</span>
    </div>
    <div class="header-hint">
      <span><kbd class="kbd">Space</kbd> Nghe lại</span>
      <span><kbd class="kbd">1-4</kbd> Chọn đáp án</span>
      <span><kbd class="kbd">→</kbd> Câu tiếp</span>
    </div>
  </header>

  <div class="layout">
    
    <aside class="sidebar">
      <div class="sidebar-header">
        <span>CHỌN BÀI HỌC</span>
      </div>
      
      <div class="sidebar-scroll" id="sidebarList">
        </div>
      
      <div class="sidebar-actions">
        <button class="btn-sidebar btn-star-mode" id="btnRetry">
          <i class="fa-solid fa-star"></i> Ôn câu sai (0)
        </button>
        <button class="btn-sidebar btn-reload" id="btnReset">
          <i class="fa-solid fa-rotate"></i> Tải lại danh sách
        </button>
        <div style="display: flex; gap: 8px;">
          <button class="btn-sidebar btn-import" id="btnImport" style="flex: 1;">
            <i class="fa-solid fa-file-import"></i> Import TSV
          </button>
        </div>
        <input type="file" id="fileInput" accept=".tsv,.txt" style="display: none;">
      </div>
    </aside>

    <main class="main" id="mainArea">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🦊</div>
        <p>Chọn một bài học từ sidebar hoặc Import file TSV để bắt đầu luyện nghe.</p>
      </div>

      <div class="quiz-container" id="quizContainer" style="display: none;">
        <div class="quiz-header">
          <div class="quiz-progress" id="quizProgress">Câu 1/20</div>
          <div class="quiz-score" id="quizScore">Điểm: 0/0</div>
        </div>

        <div class="speaker-area">
          <button class="huge-speaker-btn" id="btnSpeak">
            <i class="fa-solid fa-volume-high"></i>
          </button>
          <div class="play-count" id="playCountText">Còn 3 lần nghe</div>
        </div>

        <div class="answers-grid" id="answersGrid">
          </div>

        <div class="quiz-controls">
          <button class="ctrl-btn" id="btnNext" style="display: none;">
            Câu tiếp theo <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>
      </div>
    </main>

  </div>

  <div class="fullscreen-overlay" id="resultOverlay">
    <div class="overlay-content" id="overlayContent"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
